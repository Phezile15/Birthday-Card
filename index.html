<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Babe ❤️</title>
    <style>
        /* Full-screen background photo */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            background-image: url('us.jpeg'); /* your couple photo */
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            color: white;
        }

        /* Dark overlay to make text visible */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 0;
        }

        /* Button container */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        button {
            font-size: 36px;
            padding: 20px 50px;
            border: none;
            border-radius: 50px;
            background: #FFD700; /* gold button */
            color: #1a1a1a;
            cursor: pointer;
            animation: bounce 1s infinite;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: #FFC107;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        h1 {
            position: relative;
            z-index: 1;
            font-size: 48px;
            margin-bottom: 40px;
            color: #FFD700; /* gold text */
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Open Me 💛</h1>
        <button onclick="openMessage()">💖 Click Here 💖</button>
    </div>

    <script>
        function openMessage() {
            window.location.href = "message.html";
        }
    </script>

</body>
</html>
